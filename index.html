<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>MTS Gabriëls Factuurmaker - Automatisch PDF</title>
  <style>
    :root{
      --blue:#112b4a;
      --gold:#c6a35a;
      --light:#f5f7fb;
      --text:#172033;
      --muted:#667085;
      --border:#d9dee8;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--light);color:var(--text)}
    .app{max-width:1200px;margin:0 auto;padding:24px}
    .panel{background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:20px;box-shadow:0 8px 24px rgba(17,43,74,.08)}
    h1{margin:0 0 6px;color:var(--blue)}
    h2{margin:0 0 16px;color:var(--blue)}
    .sub{color:var(--muted);margin:0 0 18px}
    .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
    label{font-size:13px;font-weight:700;color:var(--blue);display:block;margin-bottom:6px}
    input,select,textarea{width:100%;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:14px;background:#fff}
    textarea{min-height:70px;resize:vertical}
    .actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
    button{border:0;border-radius:10px;padding:11px 16px;font-weight:700;cursor:pointer}
    .primary{background:var(--blue);color:white}
    .secondary{background:var(--gold);color:white}
    .ghost{background:#eef2f7;color:var(--blue)}
    .tenant-list{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .tenant-card{border:1px solid var(--border);border-radius:12px;padding:12px;background:#fff}
    .tenant-card input{width:auto;margin-right:8px}
    .invoice-wrap{display:flex;justify-content:center}
    .invoice{width:210mm;min-height:297mm;background:#fff;padding:15mm;box-shadow:0 8px 30px rgba(0,0,0,.12);position:relative}
    .top{display:flex;justify-content:space-between;gap:20px;border-bottom:3px solid var(--blue);padding-bottom:16px}
    .brand{display:flex;gap:12px;align-items:center}
    .logo{width:70px;height:70px;border:2px solid var(--gold);border-radius:12px;display:flex;align-items:center;justify-content:center;color:var(--blue);font-weight:900;font-size:28px}
    .brand-title{font-size:23px;font-weight:900;color:var(--blue);line-height:1.05}
    .brand-sub{font-size:12px;color:var(--gold);font-weight:700;letter-spacing:.8px;margin-top:5px}
    .factuur-title{text-align:right}
    .factuur-title h1{font-size:38px;letter-spacing:2px;margin:0}
    .meta{margin-top:8px;font-size:13px;line-height:1.55}
    .cols{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:22px}
    .box{border:1px solid var(--border);border-radius:10px;padding:13px}
    .box h3{margin:0 0 8px;color:var(--blue);font-size:16px}
    .small{font-size:13px;line-height:1.55}
    table{width:100%;border-collapse:collapse;margin-top:22px;font-size:13px}
    th{background:var(--blue);color:white;text-align:left;padding:10px}
    td{border-bottom:1px solid var(--border);padding:10px;vertical-align:top}
    td.num,th.num{text-align:right}
    .subtotal td{font-weight:700}
    .total{margin-top:18px;background:var(--blue);color:white;border-radius:12px;padding:16px;display:flex;justify-content:space-between;align-items:center;font-size:20px;font-weight:900}
    .payment{margin-top:18px;border-left:5px solid var(--gold);padding:12px 14px;background:#fbf7ee;border-radius:8px}
    .footer{position:absolute;left:15mm;right:15mm;bottom:10mm;border-top:1px solid var(--border);padding-top:8px;text-align:center;color:var(--muted);font-size:11px}
    .hidden{display:none}
    @media print{
      body{background:white}
      .no-print{display:none!important}
      .app{padding:0;max-width:none}
      .invoice{box-shadow:none;width:210mm;height:297mm;page-break-after:always;padding:15mm}
      .panel{border:0;box-shadow:none;margin:0;padding:0}
    }
    @media(max-width:900px){.grid{grid-template-columns:1fr 1fr}.tenant-list{grid-template-columns:1fr}.invoice{transform:scale(.55);transform-origin:top center;margin-bottom:-130mm}}
  </style>
</head>
<body>
<div class="app">
  <div class="panel no-print">
    <h1>MTS Gabriëls Factuurmaker</h1>
    <p class="sub">Vul alleen maand en jaar in. Het factuurnummer wordt automatisch opgebouwd: huurderprefix + 01 + maand + jaar.</p>

    <div class="grid">
      <div>
        <label>Maand</label>
        <select id="month"></select>
      </div>
      <div>
        <label>Jaar</label>
        <input id="year" type="number" min="2024" max="2099">
      </div>
      <div>
        <label>Factuurdatum</label>
        <input id="invoiceDate" type="date">
      </div>
      <div>
        <label>Betaaltermijn</label>
        <input id="dueText" value="Voor de 1e van de maand">
      </div>
    </div>

    <h2 style="margin-top:18px">Huurders</h2>
    <div class="tenant-list" id="tenantList"></div>

    <div class="grid" style="margin-top:14px">
      <div>
        <label>BTW %</label>
        <input id="vat" type="number" value="21" step="0.01">
      </div>
      <div>
        <label>Borg tonen</label>
        <select id="showDeposit">
          <option value="no">Nee, maandfactuur</option>
          <option value="yes">Ja, eerste factuur</option>
        </select>
      </div>
      <div>
        <label>Volgnummer</label>
        <input id="sequence" value="01" maxlength="2">
      </div>
      <div>
        <label>PDF naam</label>
        <input id="fileHint" value="factuur">
      </div>
    </div>

    <div style="margin-top:14px">
      <label>Omschrijving</label>
      <textarea id="description">Huur bedrijfsruimte inclusief servicekosten en voorschot stroom/water.</textarea>
    </div>

    <div class="actions">
      <button class="primary" onclick="renderInvoices()">Factuur maken</button>
      <button class="secondary" onclick="window.print()">PDF opslaan / printen</button>
      <button class="ghost" onclick="selectAll(true)">Alle huurders selecteren</button>
      <button class="ghost" onclick="selectAll(false)">Alles uitzetten</button>
    </div>
  </div>

  <div id="output"></div>
</div>

<script>
const tenants = [
  {
    id:"royal", prefix:"3", name:"Royal Fabrics", display:"Royal Fabrics - Argon 14-E8",
    unit:"Argon 14-E8", objectAddress:"Argon 14-E8, 4751 XC Oud Gastel",
    tenantAddress:"", tenantPostal:"", contact:"", email:"", kvk:"", vatNo:"",
    rent:550.00, service:55.00, utilities:50.00, deposit:1585.10
  },
  {
    id:"autodaxx", prefix:"1", name:"Autodaxx B.V.", display:"Autodaxx B.V. - Argon 14-A2",
    unit:"Argon 14-A2", objectAddress:"Argon 14-A2, 4751 XC Oud Gastel",
    tenantAddress:"", tenantPostal:"", contact:"", email:"crediteuren@autodaxx.nl", kvk:"", vatNo:"",
    rent:0, service:0, utilities:0, deposit:0
  },
  {
    id:"decazi", prefix:"2", name:"Decazi Custom Rings", display:"Decazi Custom Rings - Argon 14-F8",
    unit:"Argon 14-F8", objectAddress:"Argon 14-F8, 4751 XC Oud Gastel",
    tenantAddress:"", tenantPostal:"", contact:"", email:"mail@decazicustomrings.com", kvk:"", vatNo:"",
    rent:0, service:0, utilities:0, deposit:0
  }
];

const monthNames = ["januari","februari","maart","april","mei","juni","juli","augustus","september","oktober","november","december"];

function euro(n){ return new Intl.NumberFormat("nl-NL",{style:"currency",currency:"EUR"}).format(Number(n||0)); }
function two(n){ return String(n).padStart(2,"0"); }
function year2(y){ return String(y).slice(-2); }
function invoiceNumber(t){ return `${t.prefix}${document.getElementById("sequence").value || "01"}${two(document.getElementById("month").value)}${year2(document.getElementById("year").value)}`; }
function escapeHtml(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function init(){
  const now = new Date();
  const m = document.getElementById("month");
  monthNames.forEach((name,i)=>{
    const opt=document.createElement("option");
    opt.value=i+1; opt.textContent=`${two(i+1)} - ${name}`;
    if(i===now.getMonth()) opt.selected=true;
    m.appendChild(opt);
  });
  document.getElementById("year").value = now.getFullYear();
  document.getElementById("invoiceDate").value = now.toISOString().slice(0,10);

  const list = document.getElementById("tenantList");
  tenants.forEach((t, idx)=>{
    const div=document.createElement("div");
    div.className="tenant-card";
    div.innerHTML=`
      <label><input type="checkbox" class="tenantCheck" value="${t.id}" ${idx===0 ? "checked" : ""}> ${escapeHtml(t.display)}</label>
      <div class="grid" style="grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
        <div><label>Huur excl.</label><input data-field="rent" data-id="${t.id}" type="number" step="0.01" value="${t.rent}"></div>
        <div><label>Service excl.</label><input data-field="service" data-id="${t.id}" type="number" step="0.01" value="${t.service}"></div>
        <div><label>Stroom/water excl.</label><input data-field="utilities" data-id="${t.id}" type="number" step="0.01" value="${t.utilities}"></div>
        <div><label>Borg</label><input data-field="deposit" data-id="${t.id}" type="number" step="0.01" value="${t.deposit}"></div>
      </div>`;
    list.appendChild(div);
  });
  renderInvoices();
}

function readTenants(){
  document.querySelectorAll("[data-field]").forEach(inp=>{
    const t=tenants.find(x=>x.id===inp.dataset.id);
    t[inp.dataset.field]=Number(inp.value||0);
  });
  return [...document.querySelectorAll(".tenantCheck:checked")].map(c=>tenants.find(t=>t.id===c.value));
}

function selectAll(value){
  document.querySelectorAll(".tenantCheck").forEach(c=>c.checked=value);
  renderInvoices();
}

function renderInvoices(){
  const selected = readTenants();
  const out = document.getElementById("output");
  out.innerHTML = "";
  selected.forEach(t => out.appendChild(makeInvoice(t)));
}

function makeInvoice(t){
  const vat = Number(document.getElementById("vat").value || 21) / 100;
  const showDeposit = document.getElementById("showDeposit").value === "yes";
  const month = monthNames[Number(document.getElementById("month").value)-1];
  const year = document.getElementById("year").value;
  const period = `${month} ${year}`;
  const inv = invoiceNumber(t);

  const rentVat = t.rent * vat, serviceVat = t.service * vat, utilitiesVat = t.utilities * vat;
  const rentInc = t.rent + rentVat, serviceInc = t.service + serviceVat, utilitiesInc = t.utilities + utilitiesVat;
  const subtotal = rentInc + serviceInc + utilitiesInc;
  const total = subtotal + (showDeposit ? Number(t.deposit||0) : 0);

  const wrap = document.createElement("div");
  wrap.className = "invoice-wrap";
  wrap.innerHTML = `
    <section class="invoice">
      <div class="top">
        <div class="brand">
          <div class="logo">MTS</div>
          <div>
            <div class="brand-title">Gabriëls<br>Vastgoed Verhuur</div>
            <div class="brand-sub">VERHUUR • VASTGOED • BEDRIJFSRUIMTE</div>
          </div>
        </div>
        <div class="factuur-title">
          <h1>FACTUUR</h1>
          <div class="meta">
            <strong>Factuurnummer:</strong> ${escapeHtml(inv)}<br>
            <strong>Factuurdatum:</strong> ${escapeHtml(document.getElementById("invoiceDate").value)}<br>
            <strong>Betaaltermijn:</strong> ${escapeHtml(document.getElementById("dueText").value)}
          </div>
        </div>
      </div>

      <div class="cols">
        <div class="box small">
          <h3>Van</h3>
          <strong>MTS Gabriëls Vastgoed Verhuur</strong><br>
          Groeneweg 46<br>
          4759 BB Noordhoek<br>
          Telefoon: 06-18817930<br>
          E-mail: mtsgabriels@ziggo.nl<br>
          BTW nr.: NL826827037B01
        </div>
        <div class="box small">
          <h3>Aan</h3>
          <strong>${escapeHtml(t.name)}</strong><br>
          ${escapeHtml(t.tenantAddress || "")}<br>
          ${escapeHtml(t.tenantPostal || "")}<br>
          T.a.v. ${escapeHtml(t.contact || "")}<br>
          E-mail: ${escapeHtml(t.email || "")}<br>
          KvK nr.: ${escapeHtml(t.kvk || "")}<br>
          BTW nr.: ${escapeHtml(t.vatNo || "")}
        </div>
      </div>

      <div class="box small" style="margin-top:18px">
        <h3>Betreft</h3>
        Hierbij factureren wij u voor: <strong>${escapeHtml(document.getElementById("description").value)}</strong><br>
        Huurperiode: <strong>${escapeHtml(period)}</strong><br>
        Object / unit: <strong>${escapeHtml(t.unit)}</strong><br>
        Adres object: <strong>${escapeHtml(t.objectAddress)}</strong>
      </div>

      <table>
        <thead>
          <tr>
            <th>Omschrijving</th>
            <th class="num">Bedrag excl. btw</th>
            <th class="num">BTW</th>
            <th class="num">Bedrag incl. btw</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>Basishuur ${escapeHtml(period)}</td><td class="num">${euro(t.rent)}</td><td class="num">${euro(rentVat)}</td><td class="num">${euro(rentInc)}</td></tr>
          <tr><td>Servicekosten ${escapeHtml(period)}</td><td class="num">${euro(t.service)}</td><td class="num">${euro(serviceVat)}</td><td class="num">${euro(serviceInc)}</td></tr>
          <tr><td>Voorschot stroom/water ${escapeHtml(period)}</td><td class="num">${euro(t.utilities)}</td><td class="num">${euro(utilitiesVat)}</td><td class="num">${euro(utilitiesInc)}</td></tr>
          <tr class="subtotal"><td>Subtotaal</td><td></td><td></td><td class="num">${euro(subtotal)}</td></tr>
          ${showDeposit ? `<tr><td>Waarborgsom</td><td class="num"></td><td class="num">Geen btw</td><td class="num">${euro(t.deposit)}</td></tr>` : ""}
        </tbody>
      </table>

      <div class="total"><span>TOTAAL TE BETALEN</span><span>${euro(total)}</span></div>

      <div class="payment small">
        <strong>Betaling</strong><br>
        Graag het totaalbedrag overmaken op:<br>
        IBAN: <strong>NL04 RABO 0368 0365 10</strong><br>
        Ten name van: <strong>MTS Gabriëls Vastgoed Verhuur</strong><br>
        Onder vermelding van: <strong>factuurnummer ${escapeHtml(inv)}</strong>
      </div>

      <p class="small" style="margin-top:18px">Hartelijk dank voor uw betaling!</p>

      <div class="footer">
        MTS Gabriëls Vastgoed Verhuur • Groeneweg 46, 4759 BB Noordhoek • BTW nr.: NL826827037B01 • 06-18817930 • mtsgabriels@ziggo.nl
      </div>
    </section>`;
  return wrap;
}

init();
</script>
</body>
</html>
